<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Northstar Commerce</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">Northstar</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <a class="cart-toggle" href="shop.html">Back to shop</a>
    </header>

    <main class="page-content checkout-page">
      <section class="hero-card">
        <h1>Checkout</h1>
        <p>Your selected items are ready for a smooth purchase experience.</p>
        <form class="checkout-form">
          <input type="text" placeholder="Full name" />
          <input type="email" placeholder="Email address" />
          <input type="text" placeholder="Shipping address" />
          <button class="btn btn-primary" type="submit">Place order</button>
        </form>
      </section>
    </main>

    <footer>
      <p>© 2026 Northstar Commerce.</p>
    </footer>

    <script>
      document.querySelector('.checkout-form').addEventListener('submit', function (event) {
        event.preventDefault();
        alert('Order placed successfully!');
      });
    </script>
  </body>
</html>
